  <style>
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 9999;
      background-color: #ffffff;
      /* تم إزالة Flexbox لتجنب القفزة أثناء التحميل */
      transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
    }

    #preloader.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* هذا السطر يضمن التوسيط الدقيق والثابت */
      width: 70px;
      height: 70px;
      border-radius: 50%;
      perspective: 800px;
    }

    .loader-inner {
      position: absolute;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .loader-inner.one {
      left: 0%;
      top: 0%;
      animation: rotate-one 1.15s linear infinite;
      border-bottom: 3px solid #d4a017;
    }

    .loader-inner.two {
      right: 0%;
      top: 0%;
      animation: rotate-two 1.15s linear infinite;
      border-right: 3px solid #10b981;
    }

    .loader-inner.three {
      right: 0%;
      bottom: 0%;
      animation: rotate-three 1.15s linear infinite;
      border-top: 3px solid #d4a017;
    }

    @keyframes rotate-one {
      0% {
        transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg);
      }

      100% {
        transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg);
      }
    }

    @keyframes rotate-two {
      0% {
        transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg);
      }

      100% {
        transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg);
      }
    }

    @keyframes rotate-three {
      0% {
        transform: rotateX(35deg) rotateY(55deg) rotateZ(0deg);
      }

      100% {
        transform: rotateX(35deg) rotateY(55deg) rotateZ(360deg);
      }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    /* Glass Effect */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 101, 101, 0.5);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.7);

    }

  <script src="main.js" defer></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      // 1. منطق الاختيار التلقائي (الـ URL Params)
      const params = new URLSearchParams(window.location.search);
      const course = params.get("course");
      const plan = params.get("plan");

      if (course) {
        const select = document.getElementById("courseSelect");
        if (select) select.value = course;
      }
      if (plan) {
        const planSelect = document.getElementById("planSelect");
        if (planSelect) planSelect.value = plan;
      }

      // 2. تحديث السنة تلقائياً
      const yearSpan = document.getElementById("year-side");
      if (yearSpan) yearSpan.textContent = new Date().getFullYear();

      // 3. التعامل مع إرسال الفورم (Google Sheets)
      const form = document.getElementById("enrollForm");
      const statusMsg = document.getElementById("statusMsg");

      if (form) {
        form.addEventListener("submit", (e) => {
          e.preventDefault(); // منع التحميل التقليدي

          let isValid = true;
          let validationMessage = "";
          const nameVal = form.name.value.trim();
          const whatsappVal = form.whatsapp.value.trim();
          const ageVal = parseInt(form.age.value);
          const phoneRegex = /^[\+0-9\s\-]{8,20}$/;

          if (nameVal.length < 2) {
            isValid = false;
            validationMessage = "يرجى إدخال اسم صحيح.";
          } else if (!phoneRegex.test(whatsappVal)) {
            isValid = false;
            validationMessage = "يرجى إدخال رقم واتساب صحيح.";
          } else if (isNaN(ageVal) || ageVal < 4 || ageVal > 99) {
            isValid = false;
            validationMessage = "يرجى إدخال عمر صحيح بين 4 و 99.";
          }

          if (!isValid) {
            if (statusMsg) {
              statusMsg.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-circle-exclamation ml-1"></i> ${validationMessage}</span>`;
              setTimeout(() => statusMsg.innerHTML = "", 5000);
            }
            return;
          }

          const btn = form.querySelector('button[type="submit"]');

          // شكل الزرار أثناء الإرسال
          btn.disabled = true;
          btn.classList.add('opacity-80', 'cursor-wait');
          btn.innerHTML = `
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-2.5 h-2.5 bg-white rounded-full animate-bounce"></span>
                        <span class="w-2.5 h-2.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                        <span class="w-2.5 h-2.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                    </div>
                    <span class="mx-2">جاري الإرسال...</span>
                `;

          // إرسال البيانات لـ Netlify
          fetch('/', {
            method: 'POST',
            body: new FormData(form)
          })
            .then(response => {
              // التوجيه لصفحة الشكر فور النجاح
              window.location.href = '/thank-you';
            })
            .catch(error => {
              console.error('Error!', error.message);
              statusMsg.innerHTML = "حدث خطأ أثناء الإرسال، حاول مرة أخرى.";
              btn.disabled = false;
